const uid = () => `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;

// ============ INDEXEDDB STORAGE LAYER ============
const DB_NAME = "judaica_catalog_db";
const DB_VERSION = 1;
let dbPromise = null;

function openDB() {
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains("kv")) {
        db.createObjectStore("kv");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return dbPromise;
}

async function kvGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("kv", "readonly");
    const req = tx.objectStore("kv").get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function kvSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(value, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

// ============ IMAGE UTILITIES ============
function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function compressImage(img, maxDim = 1400, quality = 0.82) {
  const canvas = document.createElement("canvas");
  let { width, height } = img;
  if (width > height && width > maxDim) {
    height = Math.round((height * maxDim) / width);
    width = maxDim;
  } else if (height > maxDim) {
    width = Math.round((width * maxDim) / height);
    height = maxDim;
  }
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, width, height);
  return canvas.toDataURL("image/jpeg", quality);
}

// ============ DATA HOOKS ============
function useItems() {
  const [items, setItemsState] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const val = await kvGet("items");
        if (val) setItemsState(JSON.parse(val));
      } catch (e) { console.error(e); }
      setLoaded(true);
    })();
  }, []);

  const persist = useCallback(async (next) => {
    setItemsState(next);
    try { await kvSet("items", JSON.stringify(next)); }
    catch (e) { console.error("Failed to save items", e); }
  }, []);

  return { items, setItems: persist, loaded };
}

function useTopics() {
  const [topics, setTopicsState] = useState(DEFAULT_TOPICS);
  useEffect(() => {
    (async () => {
      try {
        const val = await kvGet("topics");
        if (val) setTopicsState(JSON.parse(val));
      } catch (e) { console.error(e); }
    })();
  }, []);
  const persist = useCallback(async (next) => {
    setTopicsState(next);
    try { await kvSet("topics", JSON.stringify(next)); }
    catch (e) { console.error("Failed to save topics", e); }
  }, []);
  return { topics, setTopics: persist };
}

// ============ IMAGE EDITOR (crop + rotate) ============
function ImageEditor({ src, onSave, onCancel }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [rotation, setRotation] = useState(0);
  const [img, setImg] = useState(null);
  const [crop, setCrop] = useState(null);
  const [dragStart, setDragStart] = useState(null);
  const [displaySize, setDisplaySize] = useState({ w: 0, h: 0 });

  useEffect(() => {
    const image = new Image();
    image.onload = () => setImg(image);
    image.src = src;
  }, [src]);

  const draw = useCallback(() => {
    if (!img || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const rad = (rotation * Math.PI) / 180;
    const swapped = rotation % 180 !== 0;
    const w = swapped ? img.height : img.width;
    const h = swapped ? img.width : img.height;
    const maxW = containerRef.current ? containerRef.current.clientWidth : 360;
    const maxH = containerRef.current ? containerRef.current.clientHeight : 360;
    const scale = Math.min(1, maxW / w, maxH / h);
    canvas.width = w * scale;
    canvas.height = h * scale;
    setDisplaySize({ w: canvas.width, h: canvas.height });

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(rad);
    ctx.scale(scale, scale);
    ctx.drawImage(img, -img.width / 2, -img.height / 2);
    ctx.restore();

    if (crop) {
      ctx.fillStyle = "rgba(20,16,12,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.beginPath();
      ctx.rect(crop.x, crop.y, crop.w, crop.h);
      ctx.clip();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(rad);
      ctx.scale(scale, scale);
      ctx.drawImage(img, -img.width / 2, -img.height / 2);
      ctx.restore();
      ctx.strokeStyle = "#c9a961";
      ctx.lineWidth = 2;
      ctx.strokeRect(crop.x, crop.y, crop.w, crop.h);
    }
  }, [img, rotation, crop]);

  useEffect(() => { draw(); }, [draw]);

  const getPos = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
  };
  const handlePointerDown = (e) => {
    const p = getPos(e);
    setDragStart(p);
    setCrop({ x: p.x, y: p.y, w: 0, h: 0 });
  };
  const handlePointerMove = (e) => {
    if (!dragStart) return;
    const p = getPos(e);
    setCrop({ x: Math.min(dragStart.x, p.x), y: Math.min(dragStart.y, p.y), w: Math.abs(p.x - dragStart.x), h: Math.abs(p.y - dragStart.y) });
  };
  const handlePointerUp = () => setDragStart(null);

  const applyAndSave = () => {
    const rad = (rotation * Math.PI) / 180;
    const swapped = rotation % 180 !== 0;
    const w = swapped ? img.height : img.width;
    const h = swapped ? img.width : img.height;
    const scale = displaySize.w / w;

    const full = document.createElement("canvas");
    full.width = w; full.height = h;
    const fctx = full.getContext("2d");
    fctx.translate(w / 2, h / 2);
    fctx.rotate(rad);
    fctx.drawImage(img, -img.width / 2, -img.height / 2);

    let finalCanvas = full;
    if (crop && crop.w > 4 && crop.h > 4) {
      const cropped = document.createElement("canvas");
      cropped.width = crop.w / scale;
      cropped.height = crop.h / scale;
      const cctx = cropped.getContext("2d");
      cctx.drawImage(full, crop.x / scale, crop.y / scale, crop.w / scale, crop.h / scale, 0, 0, cropped.width, cropped.height);
      finalCanvas = cropped;
    }
    onSave(finalCanvas.toDataURL("image/jpeg", 0.85));
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", flexDirection: "column", background: "var(--bg-dark)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", borderBottom: "1px solid var(--line-dark)" }}>
        <button onClick={onCancel} style={{ color: "#d9cdb8", fontSize: 14 }}>ביטול</button>
        <span style={{ color: "#d9cdb8", fontSize: 14, fontWeight: 500 }}>ערוך תמונה</span>
        <button onClick={applyAndSave} style={{ color: "var(--gold)", fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 4 }}>
          <CheckIcon size={16} /> שמור
        </button>
      </div>
      <div ref={containerRef} style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, overflow: "hidden", touchAction: "none" }}>
        <canvas
          ref={canvasRef}
          style={{ touchAction: "none", userSelect: "none", maxWidth: "100%", maxHeight: "100%" }}
          onMouseDown={handlePointerDown} onMouseMove={handlePointerMove} onMouseUp={handlePointerUp}
          onTouchStart={handlePointerDown} onTouchMove={handlePointerMove} onTouchEnd={handlePointerUp}
        />
      </div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 24, padding: "16px", borderTop: "1px solid var(--line-dark)" }}>
        <button onClick={() => setRotation((r) => (r + 90) % 360)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: "#d9cdb8" }}>
          <RotateCwIcon size={22} /><span style={{ fontSize: 11 }}>סבב</span>
        </button>
        <button onClick={() => setCrop(null)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: "#d9cdb8" }}>
          <CropIcon size={22} /><span style={{ fontSize: 11 }}>נקה חיתוך</span>
        </button>
      </div>
      <p style={{ textAlign: "center", color: "#8a7d68", fontSize: 12, paddingBottom: 12 }}>גרור על התמונה כדי לסמן חיתוך</p>
    </div>
  );
}

// ============ PHOTO SLOT ============
function PhotoSlot({ photo, onPick, onEdit, onRemove, label }) {

    <div style={{ position: "relative" }}>

        onChange={(e) => { const file = e.target.files[0]; if (file) onPick(file); e.target.value = ""; }} />

        <div style={{ position: "relative", borderRadius: 6, overflow: "hidden", border: "1px solid var(--line)", background: "#0f0d0a", aspectRatio: "1" }}>
          <img src={photo} alt={label} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />

            <button onClick={onEdit} style={{ background: "rgba(28,24,18,0.9)", color: "#d9cdb8", borderRadius: 4, padding: 6 }}><Edit3Icon size={14} /></button>
            <button onClick={onRemove} style={{ background: "rgba(28,24,18,0.9)", color: "#c98a8a", borderRadius: 4, padding: 6 }}><Trash2Icon size={14} /></button>
          </div>

        <button onClick={() => inputRef.current.click()} style={{ width: "100%", aspectRatio: "1", borderRadius: 6, border: "2px dashed #5a4f3e", background: "#241f17", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4, color: "#8a7d68" }}>
          <CameraIcon size={22} /><span style={{ fontSize: 10 }}>{label}</span>
        </button>
      )}

}

  );
}

// ============ CATALOG EXPORT VIEW ============
function CatalogExportView({ items, topics, onClose }) {
  const [selectedTopic, setSelectedTopic] = useState("all");
  const [selectedItems, setSelectedItems] = useState(new Set());
  const filtered = items.filter((it) => selectedTopic === "all" || it.topics.includes(selectedTopic));

  const toggle = (id) => setSelectedItems((prev) => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });
  const selectAll = () => setSelectedItems(new Set(filtered.map((i) => i.id)));
  const clearAll = () => setSelectedItems(new Set());

  const exportHTML = () => {
    const chosen = items.filter((i) => selectedItems.has(i.id));
    const rows = chosen.map((it) => {
      const photo = it.photos.cover || it.photos.titlePage || Object.values(it.photos)[0];
      return `<div class="lot">${photo ? `<img src="${photo}" class="lot-img" />` : ""}<div class="lot-body"><h3>${it.title}${it.author ? ` / ${it.author}` : ""}</h3><p class="meta">${[it.place, it.year].filter(Boolean).join(" · ")}</p><p class="desc">${it.description || ""}</p>${it.condition ? `<p class="condition">מצב: ${it.condition}</p>` : ""}</div></div>`;
    }).join("\n");
    const html = `<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8" /><title>קטלוג מכירה</title><style>body{font-family:Georgia,'Times New Roman',serif;background:#fbf7ee;color:#2b2418;padding:40px;max-width:800px;margin:0 auto}h1{text-align:center;border-bottom:2px solid #5b4a2f;padding-bottom:16px}.lot{display:flex;gap:20px;margin-bottom:32px;border-bottom:1px solid #d8cdb4;padding-bottom:24px}.lot-img{width:160px;height:160px;object-fit:cover;border:1px solid #d8cdb4}.lot-body{flex:1}.meta{color:#8a7d68;font-size:14px;margin:4px 0}.desc{font-size:14px;line-height:1.6}.condition{font-size:13px;color:#7a3b3b}</style></head><body><h1>קטלוג מכירה${selectedTopic !== "all" ? ` — ${selectedTopic}` : ""}</h1>${rows}</body></html>`;
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `קטלוג-מכירה-${selectedTopic === "all" ? "כל-הנושאים" : selectedTopic}.html`;
    a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 40, background: "var(--paper)", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", borderBottom: "1px solid var(--line)" }}>
        <button onClick={onClose} style={{ color: "var(--ink-soft)" }}><ChevronLeftIcon size={22} /></button>
        <h2 className="font-serif" style={{ color: "var(--ink)", fontSize: 16, margin: 0 }}>בניית קטלוג מכירה</h2>
        <div style={{ width: 22 }} />
      </div>
      <div style={{ padding: "12px 16px", borderBottom: "1px solid var(--line)", display: "flex", flexDirection: "column", gap: 8 }}>
        <label style={{ fontSize: 12, color: "var(--ink-faint)" }}>סנן לפי נושא</label>
        <select value={selectedTopic} onChange={(e) => setSelectedTopic(e.target.value)}
          style={{ width: "100%", border: "1px solid var(--line)", borderRadius: 6, padding: "8px 10px", fontSize: 14, background: "white" }}>
          <option value="all">כל הנושאים</option>
          {topics.map((t) => <option key={t} value={t}>{t}</option>)}
        </select>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--brown)" }}>
          <button onClick={selectAll}>בחר הכל ({filtered.length})</button>
          <button onClick={clearAll}>נקה בחירה</button>
        </div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8, paddingBottom: 96 }}>
        {filtered.map((it) => {
          const photo = it.photos.cover || it.photos.titlePage || Object.values(it.photos)[0];
          const checked = selectedItems.has(it.id);
          return (
            <button key={it.id} onClick={() => toggle(it.id)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: 10, borderRadius: 6, border: `1px solid ${checked ? "var(--brown)" : "var(--line)"}`, background: checked ? "var(--paper-warm)" : "white", textAlign: "right" }}>
              <div style={{ width: 20, height: 20, borderRadius: 4, border: `1px solid ${checked ? "var(--brown)" : "var(--ink-pale)"}`, background: checked ? "var(--brown)" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                {checked && <CheckIcon size={12} style={{ color: "white" }} />}
              </div>
              {photo ? <img src={photo} style={{ width: 48, height: 48, objectFit: "cover", borderRadius: 4, border: "1px solid var(--line)" }} /> : <div style={{ width: 48, height: 48, borderRadius: 4, border: "1px solid var(--line)", background: "var(--paper-warm)", display: "flex", alignItems: "center", justifyContent: "center" }}><ImageOffIcon size={16} style={{ color: "var(--ink-pale)" }} /></div>}
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 14, fontWeight: 500, color: "var(--ink)", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.title}</p>
                <p style={{ fontSize: 12, color: "var(--ink-faint)", margin: 0 }}>{it.status}</p>
              </div>
            </button>
          );
        })}
        {filtered.length === 0 && <p style={{ textAlign: "center", color: "var(--ink-pale)", fontSize: 14, padding: "32px 0" }}>אין פריטים בנושא זה</p>}
      </div>
      <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: 16, background: "var(--paper)", borderTop: "1px solid var(--line)" }}>
        <button disabled={selectedItems.size === 0} onClick={exportHTML}
          style={{ width: "100%", padding: "12px 0", borderRadius: 6, fontWeight: 600, fontSize: 14, background: selectedItems.size > 0 ? "var(--brown)" : "var(--line)", color: selectedItems.size > 0 ? "var(--paper)" : "var(--ink-pale)" }}>
          ייצא קטלוג ({selectedItems.size} פריטים נבחרו)
        </button>
      </div>
    </div>
  );
}

// ============ BACKUP (export/import JSON) ============
function BackupView({ items, topics, onImport, onClose }) {
  const fileInputRef = useRef(null);
  const [importMsg, setImportMsg] = useState("");

  const doExport = () => {
    const payload = { version: 1, exportedAt: new Date().toISOString(), items, topics };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `גיבוי-קטלוג-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const doImport = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data.items)) throw new Error("invalid");
        onImport(data.items, data.topics || []);
        setImportMsg("הייבוא הצליח: " + data.items.length + " פריטים נטענו.");
      } catch (e) {
        setImportMsg("שגיאה: הקובץ אינו קובץ גיבוי תקין.");
      }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 40, background: "var(--paper)", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px", borderBottom: "1px solid var(--line)" }}>
        <button onClick={onClose} style={{ color: "var(--ink-soft)" }}><ChevronLeftIcon size={22} /></button>
        <h2 className="font-serif" style={{ color: "var(--ink)", fontSize: 16, margin: 0 }}>גיבוי ושחזור</h2>
        <div style={{ width: 22 }} />
      </div>
      <div style={{ flex: 1, padding: 20, display: "flex", flexDirection: "column", gap: 24 }}>
        <div>
          <p style={{ fontSize: 14, color: "var(--ink)", marginBottom: 8, lineHeight: 1.6 }}>
            המידע שלך נשמר בדפדפן של המכשיר הזה בלבד. מומלץ לייצא גיבוי מדי פעם ולשמור אותו במקום בטוח (לדוגמה Google Drive), כדי לא לאבד מידע אם תחליף מכשיר או תנקה את הדפדפן.
          </p>
          <button onClick={doExport} style={{ width: "100%", padding: "12px 0", borderRadius: 6, fontWeight: 600, fontSize: 14, background: "var(--brown)", color: "var(--paper)", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            <DownloadIcon size={16} /> ייצא קובץ גיבוי ({items.length} פריטים)
          </button>
        </div>
        <div style={{ borderTop: "1px solid var(--line)", paddingTop: 20 }}>
          <p style={{ fontSize: 14, color: "var(--ink)", marginBottom: 8, lineHeight: 1.6 }}>
            שחזור מקובץ גיבוי ימחק ויחליף את כל הנתונים הקיימים במכשיר הזה.
          </p>
          <input ref={fileInputRef} type="file" accept="application/json" style={{ display: "none" }}
            onChange={(e) => { const f = e.target.files[0]; if (f) doImport(f); e.target.value = ""; }} />
          <button onClick={() => fileInputRef.current.click()} style={{ width: "100%", padding: "12px 0", borderRadius: 6, fontWeight: 600, fontSize: 14, border: "1px solid var(--brown)", color: "var(--brown)", background: "white", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            <UploadIcon size={16} /> ייבא קובץ גיבוי
          </button>
          {importMsg && <p style={{ fontSize: 13, marginTop: 10, color: importMsg.startsWith("שגיאה") ? "var(--red)" : "var(--green)" }}>{importMsg}</p>}
        </div>
      </div>
    </div>
  );
}

// ============ MAIN APP ============
function App() {
  const { items, setItems, loaded } = useItems();
  const { topics, setTopics } = useTopics();
  const [view, setView] = useState("list");
  const [activeItem, setActiveItem] = useState(null);
  const [search, setSearch] = useState("");
  const [filterCategory, setFilterCategory] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [showFilters, setShowFilters] = useState(false);

  const handleSaveItem = async (item) => {
    const exists = items.find((i) => i.id === item.id);
    const next = exists ? items.map((i) => (i.id === item.id ? item : i)) : [...items, item];
    await setItems(next);
    setView("list"); setActiveItem(null);
  };
  const handleDelete = async (id) => { await setItems(items.filter((i) => i.id !== id)); setView("list"); setActiveItem(null); };
  const handleAddTopic = async (t) => { if (!topics.includes(t)) await setTopics([...topics, t]); };
  const handleImport = async (importedItems, importedTopics) => {
    await setItems(importedItems);
    if (importedTopics && importedTopics.length) await setTopics(importedTopics);
    setView("list");
  };

  const filtered = items.filter((it) => {
    const q = search.trim().toLowerCase();
    const matchesSearch = !q || [it.title, it.author, it.place, it.description, it.location.area, it.location.box, it.location.shelf, ...it.topics].join(" ").toLowerCase().includes(q);
    const matchesCategory = filterCategory === "all" || it.category === filterCategory;
    const matchesStatus = filterStatus === "all" || it.status === filterStatus;
    return matchesSearch && matchesCategory && matchesStatus;
  });
  const sorted = [...filtered].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  if (!loaded) {
    return <div style={{ minHeight: "100vh", background: "var(--paper)", display: "flex", alignItems: "center", justifyContent: "center" }}><p style={{ color: "var(--ink-faint)", fontSize: 14 }}>טוען קטלוג...</p></div>;
  }

  return (
    <div style={{ minHeight: "100vh", background: "var(--paper)" }} dir="rtl">
      {view === "form" && (
        <ItemForm initial={activeItem} topics={topics} onAddTopic={handleAddTopic} onSave={handleSaveItem}
          onClose={() => setView(activeItem ? "detail" : "list")} />
      )}
      {view === "detail" && activeItem && (
        <ItemDetail item={items.find((i) => i.id === activeItem.id) || activeItem}
          onClose={() => { setView("list"); setActiveItem(null); }}
          onEdit={(it) => { setActiveItem(it); setView("form"); }}
          onDelete={handleDelete} />
      )}
      {view === "export" && <CatalogExportView items={items} topics={topics} onClose={() => setView("list")} />}
      {view === "backup" && <BackupView items={items} topics={topics} onImport={handleImport} onClose={() => setView("list")} />}

      {view === "list" && (
        <div style={{ paddingBottom: 96 }}>
          <div style={{ padding: "24px 16px 12px", borderBottom: "1px solid var(--line)", background: "var(--paper)", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
              <h1 className="font-serif" style={{ fontSize: 22, color: "var(--ink)", margin: 0 }}>קטלוג האוסף</h1>
              <button onClick={() => setView("backup")} style={{ fontSize: 12, color: "var(--ink-faint)" }}>{items.length} פריטים · גיבוי</button>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1, position: "relative" }}>
                <SearchIcon size={16} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", color: "var(--ink-pale)" }} />
                <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="חפש כותרת, מחבר, מיקום, נושא..."
                  style={{ width: "100%", paddingRight: 34, paddingLeft: 12, paddingTop: 9, paddingBottom: 9, borderRadius: 6, border: "1px solid var(--line)", background: "white", fontSize: 14, color: "var(--ink)" }} />
              </div>
              <button onClick={() => setShowFilters((s) => !s)}
                style={{ padding: "0 12px", borderRadius: 6, border: `1px solid ${showFilters ? "var(--brown)" : "var(--line)"}`, background: showFilters ? "var(--brown)" : "white", color: showFilters ? "white" : "var(--ink-soft)" }}>
                <FilterIcon size={16} />
              </button>
            </div>
            {showFilters && (
              <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} style={{ flex: 1, fontSize: 12, border: "1px solid var(--line)", borderRadius: 6, padding: "8px", background: "white" }}>
                  <option value="all">כל הקטגוריות</option>
                  {Object.values(CATEGORY).map((c) => <option key={c} value={c}>{c}</option>)}
                </select>
                <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} style={{ flex: 1, fontSize: 12, border: "1px solid var(--line)", borderRadius: 6, padding: "8px", background: "white" }}>
                  <option value="all">כל הסטטוסים</option>
                  {Object.values(STATUS).map((s) => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            )}
          </div>

          <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
            {sorted.length === 0 && (
              <div style={{ textAlign: "center", padding: "64px 0" }}>
                <ArchiveIcon size={32} style={{ color: "var(--line)", margin: "0 auto 12px" }} />
                <p style={{ color: "var(--ink-faint)", fontSize: 14 }}>{items.length === 0 ? "עדיין לא הוספת פריטים" : "לא נמצאו פריטים מתאימים"}</p>
              </div>
            )}
            {sorted.map((it) => {
              const photo = it.photos.cover || it.photos.titlePage || Object.values(it.photos)[0];
              return (
                <button key={it.id} onClick={() => { setActiveItem(it); setView("detail"); }}
                  style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: 12, borderRadius: 6, border: "1px solid var(--line)", background: "white", textAlign: "right" }}>
                  {photo ? <img src={photo} style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 4, border: "1px solid var(--line)", flexShrink: 0 }} /> : <div style={{ width: 56, height: 56, borderRadius: 4, border: "1px solid var(--line)", background: "var(--paper-warm)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><ImageOffIcon size={18} style={{ color: "var(--ink-pale)" }} /></div>}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ fontSize: 14, fontWeight: 500, color: "var(--ink)", margin: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{it.title}</p>
                    <p style={{ fontSize: 12, color: "var(--ink-faint)", margin: "2px 0 0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{[it.category, it.itemType, it.place].filter(Boolean).join(" · ")}</p>
                    {(it.location.area || it.location.box) && (
                      <p style={{ fontSize: 12, color: "var(--ink-pale)", display: "flex", alignItems: "center", gap: 3, margin: "2px 0 0" }}>
                        <MapPinIcon size={10} />{[it.location.area, it.location.box && `ארגז ${it.location.box}`].filter(Boolean).join(" · ")}
                      </p>
                    )}
                  </div>
                  <span style={{ fontSize: 10, padding: "4px 8px", borderRadius: 999, color: "white", background: STATUS_COLOR[it.status], flexShrink: 0 }}>{it.status}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {view === "list" && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, display: "flex", gap: 8, padding: 16, background: "var(--paper)", borderTop: "1px solid var(--line)" }}>
          <button onClick={() => setView("export")} style={{ flex: 1, padding: "12px 0", borderRadius: 6, border: "1px solid var(--brown)", color: "var(--brown)", fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, background: "white" }}>
            <ArchiveIcon size={16} /> בניית קטלוג
          </button>
          <button onClick={() => { setActiveItem(null); setView("form"); }} style={{ flex: 1, padding: "12px 0", borderRadius: 6, background: "var(--brown)", color: "var(--paper)", fontSize: 14, fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            <PlusIcon size={16} /> פריט חדש
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  // Inline PWA manifest as a Blob so the whole app stays a single file
  const manifest = {
    name: "קטלוג האוסף",
    short_name: "קטלוג",
    start_url: ".",
    display: "standalone",
    background_color: "#fbf7ee",
    theme_color: "#2b2418",
    icons: [
      { src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" fill="%232b2418"/><text x="50%" y="58%" font-size="280" text-anchor="middle" fill="%23c9a961" font-family="Georgia, serif">א</text></svg>'), sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  document.getElementById("manifestLink").href = URL.createObjectURL(manifestBlob);

  // Apple touch icon (inline SVG data URI)
  document.getElementById("appleIcon").href = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180"><rect width="180" height="180" fill="#2b2418"/><text x="50%" y="62%" font-size="100" text-anchor="middle" fill="#c9a961" font-family="Georgia, serif">א</text></svg>');
</script>
</body>
</html>
