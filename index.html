<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>קטלוג האוסף</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,Arial,sans-serif;background:#fbf7ee;color:#2b2418;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}
#screen-list,#screen-form,#screen-detail{min-height:100vh}

/* LIST */
.header{padding:20px 16px 12px;border-bottom:1px solid #d8cdb4;background:#fbf7ee;position:sticky;top:0;z-index:5}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.htitle{font-size:22px;font-family:Georgia,serif}
.hcount{font-size:12px;color:#8a7d68;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid #d8cdb4}
.sbox{width:100%;padding:10px 12px;border:1px solid #d8cdb4;border-radius:8px;background:white;font-size:14px}
.items{padding:12px 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:100px}
.icard{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1px solid #d8cdb4;background:white;width:100%;text-align:right;cursor:pointer;-webkit-appearance:none}
.icard:active{background:#f0e9d8}
.ithumb{width:56px;height:56px;border-radius:4px;border:1px solid #d8cdb4;object-fit:cover;flex-shrink:0}
.ithumb-empty{width:56px;height:56px;border-radius:4px;border:1px solid #d8cdb4;background:#f0e9d8;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:24px}
.iinfo{flex:1;min-width:0;text-align:right}
.ititle{font-size:14px;font-weight:600;color:#2b2418;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.isub{font-size:12px;color:#8a7d68;margin-top:2px}
.ibadge{font-size:10px;padding:4px 8px;border-radius:999px;color:white;flex-shrink:0}
.empty{text-align:center;padding:60px 0;color:#8a7d68}
.botbar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:8px;padding:16px;background:#fbf7ee;border-top:1px solid #d8cdb4;z-index:5}
.bbtn{flex:1;padding:14px 0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.bbtn-pri{background:#5b4a2f;color:#fbf7ee;border:none}
.bbtn-sec{background:white;color:#5b4a2f;border:1px solid #5b4a2f}
.bbtn-pri:active{background:#4a3a22}
.bbtn-sec:active{background:#f0e9d8}

/* FORM */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #d8cdb4;background:#fbf7ee;position:sticky;top:0;z-index:5}
.tbback{font-size:26px;color:#5a4f3e;padding:4px 8px;cursor:pointer;line-height:1}
.tbback:active{opacity:.6}
.tbtitle{font-size:16px;font-family:Georgia,serif}
.tbsave{font-size:13px;font-weight:600;padding:8px 16px;border-radius:6px;background:#5b4a2f;color:#fbf7ee;border:none;cursor:pointer}
.tbsave:active{background:#4a3a22}
.tbsave:disabled{background:#d8cdb4;color:#a89a7d}
.fbody{padding:16px;display:flex;flex-direction:column;gap:20px;padding-bottom:40px}
.flabel{font-size:12px;color:#8a7d68;display:block;margin-bottom:5px}
.finput{width:100%;border:1px solid #d8cdb4;border-radius:6px;background:white;color:#2b2418;padding:10px 12px;font-size:14px}
.finput:focus{outline:2px solid #c9a961;border-color:#c9a961}
.fta{width:100%;border:1px solid #d8cdb4;border-radius:6px;background:white;color:#2b2418;padding:10px 12px;font-size:14px;resize:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.seg{display:flex;border-radius:6px;border:1px solid #d8cdb4;overflow:hidden}
.segb{flex:1;padding:9px 0;font-size:13px;background:white;color:#5a4f3e;border:none;cursor:pointer}
.segb:active,.segb.on{background:#5b4a2f;color:#fbf7ee}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px solid #d8cdb4;background:white;color:#5a4f3e;cursor:pointer}
.chip.on{background:#5b4a2f;color:#fbf7ee;border-color:#5b4a2f}
.chip:active{opacity:.7}
.addchip{font-size:12px;padding:6px 10px;border-radius:999px;border:1px dashed #a89a7d;color:#8a7d68;background:none;cursor:pointer}
.pslot{position:relative;aspect-ratio:1}
.pslot img{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid #d8cdb4;display:block}
.pempty{width:100%;aspect-ratio:1;border-radius:6px;border:2px dashed #5a4f3e;background:#1c1812;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:#8a7d68;font-size:10px;cursor:pointer}
.pov{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:space-between;padding:5px;border-radius:6px}
.povb{background:rgba(0,0,0,.7);border-radius:4px;padding:5px 7px;font-size:12px;color:white;border:none;cursor:pointer}
.povb:active{opacity:.7}
.salec{border:1px solid #d8cdb4;border-radius:6px;padding:10px;background:white;display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.warn{font-size:12px;margin-top:6px;color:#7a3b3b;font-weight:500}
.info{font-size:12px;margin-top:6px;color:#8a7d68}
.secttitle{font-size:12px;color:#8a7d68;margin-bottom:8px}
.drow{display:flex;align-items:center;justify-content:space-between}

/* DETAIL */
.dbody{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:40px}
.dphotos{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dphotos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;border:1px solid #d8cdb4}
.dname{font-size:20px;font-family:Georgia,serif;margin-top:4px}
.dsub{font-size:14px;color:#8a7d68;margin-top:2px}
.dsect{border-top:1px solid #d8cdb4;padding-top:12px}
.dlbl{font-size:12px;color:#8a7d68;margin-bottom:4px}
.dval{font-size:14px}
.dtags{display:flex;flex-wrap:wrap;gap:6px}
.dtag{font-size:12px;padding:4px 8px;border-radius:999px;background:#f0e9d8;color:#5b4a2f}
.shist{background:#f0e9d8;border-radius:6px;padding:10px;margin-bottom:8px}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);display:flex;flex-direction:column;align-items:center;justify-content:center}
#lightbox.hidden{display:none!important}
#lightbox img{max-width:100%;max-height:80vh;object-fit:contain}
.lbbar{display:flex;gap:12px;padding:16px;justify-content:center}
.lbbtn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.lbbtn-dl{background:#c9a961;color:#1c1812}
.lbbtn-cl{background:#3a3226;color:#d9cdb8}
.lbbtn:active{opacity:.7}

/* IMAGE EDITOR */
#img-editor{position:fixed;inset:0;z-index:101;background:#1c1812;display:flex;flex-direction:column}
#img-editor.hidden{display:none!important}
.ied-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #3a3226;flex-shrink:0}
.ied-top button{font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;padding:6px 12px;border-radius:6px}
.ied-cancel{color:#d9cdb8}
.ied-save{color:#1c1812;background:#c9a961}
.ied-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden;touch-action:none}
#ied-canvas{touch-action:none;max-width:100%;max-height:100%}
.ied-tools{display:flex;justify-content:center;gap:24px;padding:16px;border-top:1px solid #3a3226;flex-shrink:0}
.ied-tool{display:flex;flex-direction:column;align-items:center;gap:4px;color:#d9cdb8;font-size:11px;background:none;border:none;cursor:pointer;padding:8px 16px;border-radius:8px}
.ied-tool:active{background:#3a3226}
.ied-hint{text-align:center;color:#8a7d68;font-size:11px;padding-bottom:10px;flex-shrink:0}
</style>
</head>
<body>

<!-- LIST -->
<div id="screen-list">
  <div class="header">
    <div class="hrow">
      <div class="htitle">קטלוג האוסף</div>
      <button class="hcount" id="btn-count">0 פריטים · גיבוי</button>
    </div>
    <input class="sbox" id="search" type="search" placeholder="חפש כותרת, מחבר, מיקום..."/>
  </div>
  <div class="items" id="items-list"></div>
  <div class="botbar">
    <button class="bbtn bbtn-sec" id="btn-catalog">📋 קטלוג מכירה</button>
    <button class="bbtn bbtn-pri" id="btn-new">+ פריט חדש</button>
  </div>
</div>

<!-- FORM -->
<div id="screen-form" class="hidden">
  <div class="topbar">
    <button class="tbback" id="btn-form-back">‹</button>
    <div class="tbtitle" id="form-title-el">פריט חדש</div>
    <button class="tbsave" id="btn-save" disabled>שמור</button>
  </div>
  <div class="fbody">
    <div class="g2">
      <div>
        <div class="flabel">קטגוריה</div>
        <div class="seg" id="seg-cat">
          <button class="segb on" data-val="קודש">קודש</button>
          <button class="segb" data-val="חול">חול</button>
        </div>
      </div>
      <div>
        <div class="flabel">סוג</div>
        <div class="seg" id="seg-type">
          <button class="segb on" data-val="ספר">ספר</button>
          <button class="segb" data-val="כתב יד">כ"י</button>
          <button class="segb" data-val="חפץ">חפץ</button>
        </div>
      </div>
    </div>

    <div>
      <div class="flabel">תמונות</div>
      <div class="g4" id="photo-grid"></div>
    </div>

    <div><label class="flabel">כותרת *</label><input class="finput" id="f-title" type="text" placeholder="שם הספר / החפץ"/></div>
    <div class="g2">
      <div><label class="flabel">מחבר/יוצר</label><input class="finput" id="f-author" type="text"/></div>
      <div><label class="flabel">שנה</label><input class="finput" id="f-year" type="text" placeholder='תרצ"ח'/></div>
    </div>
    <div><label class="flabel">מקום הדפסה/ייצור</label><input class="finput" id="f-place" type="text"/></div>
    <div><label class="flabel">תיאור / הערות</label><textarea class="fta" id="f-desc" rows="3"></textarea></div>
    <div><label class="flabel">מצב הפריט</label><input class="finput" id="f-condition" type="text" placeholder="שלם, כריכה רעועה..."/></div>

    <div>
      <div class="secttitle">🏷 נושאים</div>
      <div class="chips" id="chips-wrap"></div>
    </div>

    <div>
      <div class="secttitle">📍 מיקום פיזי</div>
      <div class="g3">
        <input class="finput" id="f-loc-area" type="text" placeholder="מחסן/חדר"/>
        <input class="finput" id="f-loc-box" type="text" placeholder="ארגז"/>
        <input class="finput" id="f-loc-shelf" type="text" placeholder="מדף"/>
      </div>
    </div>

    <div>
      <div class="secttitle">מקור רכישה</div>
      <input class="finput" id="f-acq-src" type="text" placeholder="ממי / היכן נרכש" style="margin-bottom:8px"/>
      <div class="g2">
        <input class="finput" id="f-acq-date" type="date"/>
        <input class="finput" id="f-acq-price" type="number" placeholder="מחיר רכישה (₪)"/>
      </div>
    </div>

    <div>
      <div class="secttitle">📈 מחיר מינימום למכירה</div>
      <input class="finput" id="f-minprice" type="number" placeholder="₪"/>
      <div class="info" id="price-info"></div>
    </div>

    <div>
      <div class="secttitle">סטטוס</div>
      <div class="seg" id="seg-status">
        <button class="segb on" data-val="באוסף" style="font-size:12px">באוסף</button>
        <button class="segb" data-val="הוצע למכירה" style="font-size:12px">הוצע</button>
        <button class="segb" data-val="נמכר" style="font-size:12px">נמכר</button>
      </div>
      <div id="sold-wrap" class="hidden" style="margin-top:8px">
        <input class="finput" id="f-sold" type="number" placeholder="מחיר מכירה סופי (₪)"/>
        <div class="warn hidden" id="sold-warn"></div>
      </div>
    </div>

    <div>
      <div class="drow" style="margin-bottom:8px">
        <div class="secttitle" style="margin:0">📦 היסטוריית מכירות</div>
        <button id="btn-add-sale" style="font-size:12px;color:#5b4a2f;font-weight:600;padding:4px 8px;cursor:pointer">+ הוסף</button>
      </div>
      <div id="sale-list"></div>
    </div>
  </div>
</div>

<!-- DETAIL -->
<div id="screen-detail" class="hidden">
  <div class="topbar">
    <button class="tbback" id="btn-detail-back">‹</button>
    <span class="ibadge" id="detail-badge">באוסף</span>
    <div style="display:flex;gap:12px">
      <button id="btn-edit" style="font-size:18px;cursor:pointer">✏️</button>
      <button id="btn-delete" style="font-size:18px;cursor:pointer">🗑️</button>
    </div>
  </div>
  <div class="dbody" id="detail-body"></div>
</div>

<script>
// ===== DATA =====
var items = [];
var topics = ["חסידות","ש\"ס","סידורים","קבלה","תנ\"ך ומפרשים","הלכה","דרשות","מוסר","כתבי יד","תשמישי קדושה","מפות","אמנות יהודית"];
var currentId = null;
var formPhotos = {};
var formSales = [];
var formTopics = [];
var segVals = {cat:"קודש", type:"ספר", status:"באוסף"};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function sc(s){ return s==="באוסף"?"#5b6b4f":s==="הוצע למכירה"?"#9c6b2e":"#7a3b3b"; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ===== STORAGE =====
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function load(k,def){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } }

// ===== SCREENS =====
function show(id){
  ["screen-list","screen-form","screen-detail"].forEach(function(s){
    document.getElementById(s).classList.toggle("hidden", s!==id);
  });
  window.scrollTo(0,0);
}

// ===== LIST =====
function renderList(){
  var q=(document.getElementById("search").value||"").toLowerCase().trim();
  var list=items.filter(function(it){
    if(!q) return true;
    return [it.title,it.author,it.place,it.description,it.location.area,it.location.box].concat(it.topics||[]).join(" ").toLowerCase().indexOf(q)>=0;
  }).sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); });
  
  document.getElementById("btn-count").textContent=items.length+" פריטים · גיבוי";
  
  var el=document.getElementById("items-list");
  if(!list.length){
    el.innerHTML='<div class="empty"><div style="font-size:40px;margin-bottom:12px">📚</div>'+(items.length?"לא נמצאו פריטים":"עדיין לא הוספת פריטים")+'</div>';
    return;
  }
  el.innerHTML=list.map(function(it){
    var photo=it.photos.cover||it.photos.titlePage||Object.values(it.photos||{})[0];
    var loc=[it.location.area,it.location.box?"ארגז "+it.location.box:""].filter(Boolean).join(" · ");
    return '<button class="icard" data-id="'+it.id+'">'
      +(photo?'<img class="ithumb" src="'+photo+'"/>':"<div class='ithumb-empty'>📄</div>")
      +'<div class="iinfo"><div class="ititle">'+esc(it.title)+'</div>'
      +'<div class="isub">'+esc([it.category,it.itemType,it.place].filter(Boolean).join(" · "))+'</div>'
      +(loc?'<div class="isub" style="font-size:11px;color:#a89a7d">📍 '+esc(loc)+'</div>':"")
      +'</div><span class="ibadge" style="background:'+sc(it.status)+'">'+it.status+'</span></button>';
  }).join("");
  
  el.querySelectorAll(".icard").forEach(function(b){
    b.addEventListener("click", function(){ showDetail(this.dataset.id); });
  });
}

// ===== FORM =====
var SLOTS=[{k:"cover",l:"שער"},{k:"titlePage",l:"עמוד שער"},{k:"colophon",l:"קולופון"},{k:"condition",l:"מצב/פגם"}];

function showForm(item){
  currentId=item?item.id:null;
  document.getElementById("form-title-el").textContent=item?"ערוך פריט":"פריט חדש";
  segVals={cat:item?item.category:"קודש", type:item?item.itemType:"ספר", status:item?item.status:"באוסף"};
  ["cat","type","status"].forEach(renderSeg);
  
  document.getElementById("f-title").value=item?item.title:"";
  document.getElementById("f-author").value=item?item.author:"";
  document.getElementById("f-year").value=item?item.year:"";
  document.getElementById("f-place").value=item?item.place:"";
  document.getElementById("f-desc").value=item?item.description:"";
  document.getElementById("f-condition").value=item?item.condition:"";
  document.getElementById("f-loc-area").value=item?item.location.area:"";
  document.getElementById("f-loc-box").value=item?item.location.box:"";
  document.getElementById("f-loc-shelf").value=item?item.location.shelf:"";
  document.getElementById("f-acq-src").value=item?item.acquisition.source:"";
  document.getElementById("f-acq-date").value=item?item.acquisition.date:"";
  document.getElementById("f-acq-price").value=item?item.acquisition.price:"";
  document.getElementById("f-minprice").value=item?item.minPrice:"";
  document.getElementById("f-sold").value=item?item.soldPrice:"";
  
  formPhotos=item?Object.assign({},item.photos):{};
  formSales=item?JSON.parse(JSON.stringify(item.saleHistory||[])):[];
  formTopics=item?[].concat(item.topics||[]):[];
  
  renderPhotoGrid();
  renderChips();
  renderSales();
  updateSaveBtn();
  updatePriceInfo();
  toggleSoldWrap();
  show("screen-form");
}

function renderSeg(seg){
  var wrap=document.getElementById("seg-"+seg);
  wrap.querySelectorAll(".segb").forEach(function(b){
    b.classList.toggle("on", b.dataset.val===segVals[seg]);
  });
}

function updateSaveBtn(){
  document.getElementById("btn-save").disabled=!document.getElementById("f-title").value.trim();
}
function updatePriceInfo(){
  var min=document.getElementById("f-minprice").value;
  var cost=document.getElementById("f-acq-price").value;
  document.getElementById("price-info").textContent=(min&&cost)?"עלות: ₪"+cost+" · מינימום: ₪"+min:"";
}
function toggleSoldWrap(){
  document.getElementById("sold-wrap").classList.toggle("hidden", segVals.status!=="נמכר");
}
function checkSoldWarn(){
  var min=parseFloat(document.getElementById("f-minprice").value);
  var sold=parseFloat(document.getElementById("f-sold").value);
  var w=document.getElementById("sold-warn");
  if(min&&sold&&sold<min){ w.textContent="⚠ מחיר נמוך מהמינימום (₪"+min+")"; w.classList.remove("hidden"); }
  else w.classList.add("hidden");
}

function renderPhotoGrid(){
  var wrap=document.getElementById("photo-grid");
  wrap.innerHTML=SLOTS.map(function(s){
    var p=formPhotos[s.k];
    return p
      ?'<div class="pslot"><img src="'+p+'" data-viewsrc="'+p+'"/><div class="pov"><button class="povb" data-key="'+s.k+'" data-action="edit">✏</button><button class="povb" data-key="'+s.k+'" data-action="remove">🗑</button></div></div>'
      :'<label class="pslot"><div class="pempty">📷<span>'+s.l+'</span><input type="file" accept="image/*" capture="environment" data-key="'+s.k+'" style="display:none"/></div></label>';
  }).join("");
  
  wrap.querySelectorAll('input[type="file"]').forEach(function(inp){
    inp.addEventListener("change", function(){
      var key=this.dataset.key, file=this.files[0]; if(!file) return;
      compressFile(file, function(dataUrl){ formPhotos[key]=dataUrl; renderPhotoGrid(); });
    });
  });
  wrap.querySelectorAll('[data-action="remove"]').forEach(function(b){
    b.addEventListener("click", function(e){ e.preventDefault(); delete formPhotos[this.dataset.key]; renderPhotoGrid(); });
  });
  wrap.querySelectorAll('[data-action="edit"]').forEach(function(b){
    b.addEventListener("click", function(e){ e.preventDefault(); openEditor(this.dataset.key); });
  });
  wrap.querySelectorAll('img[data-viewsrc]').forEach(function(img){
    img.addEventListener("click", function(){ openLightbox(this.dataset.viewsrc); });
    img.style.cursor = "pointer";
  });
}

function compressFile(file, cb){
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var maxD=1400,q=0.82,w=img.width,h=img.height;
      if(w>h&&w>maxD){h=Math.round(h*maxD/w);w=maxD;}else if(h>maxD){w=Math.round(w*maxD/h);h=maxD;}
      var c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",q));
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}

// ===== IMAGE EDITOR =====
var iedImg = null, iedKey = null, iedRot = 0, iedCrop = null, iedDrag = null, iedDispW = 0, iedDispH = 0;

function openEditor(key){
  var src = formPhotos[key]; if(!src) return;
  iedKey = key; iedRot = 0; iedCrop = null; iedDrag = null;
  var img = new Image();
  img.onload = function(){ iedImg = img; document.getElementById("img-editor").classList.remove("hidden"); drawIed(); };
  img.src = src;
}

function drawIed(){
  if(!iedImg) return;
  var canvas = document.getElementById("ied-canvas");
  var wrap = document.getElementById("ied-wrap");
  var rad = iedRot * Math.PI / 180;
  var sw = iedRot % 180 !== 0;
  var w = sw ? iedImg.height : iedImg.width;
  var h = sw ? iedImg.width : iedImg.height;
  var maxW = wrap.clientWidth || 360;
  var maxH = wrap.clientHeight || 400;
  var scale = Math.min(1, maxW / w, maxH / h);
  canvas.width = w * scale; canvas.height = h * scale;
  iedDispW = canvas.width; iedDispH = canvas.height;
  var ctx = canvas.getContext("2d");
  ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(rad); ctx.scale(scale, scale);
  ctx.drawImage(iedImg, -iedImg.width/2, -iedImg.height/2); ctx.restore();
  if(iedCrop && iedCrop.w > 4 && iedCrop.h > 4){
    ctx.fillStyle = "rgba(0,0,0,.55)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save(); ctx.beginPath(); ctx.rect(iedCrop.x,iedCrop.y,iedCrop.w,iedCrop.h); ctx.clip();
    ctx.translate(canvas.width/2,canvas.height/2); ctx.rotate(rad); ctx.scale(scale,scale);
    ctx.drawImage(iedImg,-iedImg.width/2,-iedImg.height/2); ctx.restore();
    ctx.strokeStyle="#c9a961"; ctx.lineWidth=2; ctx.strokeRect(iedCrop.x,iedCrop.y,iedCrop.w,iedCrop.h);
  }
}

function iedPos(e){
  var r = document.getElementById("ied-canvas").getBoundingClientRect();
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  return {x: cx - r.left, y: cy - r.top};
}

function saveIed(){
  var rad = iedRot * Math.PI / 180;
  var sw = iedRot % 180 !== 0;
  var w = sw ? iedImg.height : iedImg.width;
  var h = sw ? iedImg.width : iedImg.height;
  var full = document.createElement("canvas"); full.width = w; full.height = h;
  var fctx = full.getContext("2d");
  fctx.translate(w/2, h/2); fctx.rotate(rad); fctx.drawImage(iedImg, -iedImg.width/2, -iedImg.height/2);
  var final = full;
  if(iedCrop && iedCrop.w > 4 && iedCrop.h > 4){
    var scale = iedDispW / w;
    var cr = document.createElement("canvas");
    cr.width = iedCrop.w / scale; cr.height = iedCrop.h / scale;
    cr.getContext("2d").drawImage(full, iedCrop.x/scale, iedCrop.y/scale, iedCrop.w/scale, iedCrop.h/scale, 0, 0, cr.width, cr.height);
    final = cr;
  }
  formPhotos[iedKey] = final.toDataURL("image/jpeg", 0.85);
  document.getElementById("img-editor").classList.add("hidden");
  renderPhotoGrid();
}

  document.getElementById("btn-new").addEventListener("click", function(){ showForm(null); });

  });

  // Form events

  });

    formSales.push({id:uid(),date:"",venue:"",offeredPrice:"",outcome:"לא נמכר",notes:""});
    renderSales();
  });
  
  // Segments
  ["cat","type","status"].forEach(function(seg){
    document.getElementById("seg-"+seg).querySelectorAll(".segb").forEach(function(b){
      b.addEventListener("click", function(){
        segVals[seg]=this.dataset.val;

        if(seg==="status") toggleSoldWrap();
      });

  });

  document.getElementById("btn-detail-back").addEventListener("click", function(){ show("screen-list"); currentId=null; });

    var item=items.find(function(i){return i.id===currentId;}); if(item) showForm(item);
  });

  // Editor
  document.getElementById("ied-cancel").addEventListener("click", function(){ document.getElementById("img-editor").classList.add("hidden"); });
  document.getElementById("ied-save").addEventListener("click", saveIed);
  document.getElementById("ied-rotate").addEventListener("click", function(){ iedRot=(iedRot+90)%360; iedCrop=null; drawIed(); });
  document.getElementById("ied-clearcrop").addEventListener("click", function(){ iedCrop=null; drawIed(); });
  var iedCanvas = document.getElementById("ied-canvas");
  iedCanvas.addEventListener("mousedown", function(e){ var p=iedPos(e); iedDrag=p; iedCrop={x:p.x,y:p.y,w:0,h:0}; });
  iedCanvas.addEventListener("mousemove", function(e){ if(!iedDrag)return; var p=iedPos(e); iedCrop={x:Math.min(iedDrag.x,p.x),y:Math.min(iedDrag.y,p.y),w:Math.abs(p.x-iedDrag.x),h:Math.abs(p.y-iedDrag.y)}; drawIed(); });
  iedCanvas.addEventListener("mouseup", function(){ iedDrag=null; });
  iedCanvas.addEventListener("touchstart", function(e){ e.preventDefault(); var p=iedPos(e); iedDrag=p; iedCrop={x:p.x,y:p.y,w:0,h:0}; }, {passive:false});
  iedCanvas.addEventListener("touchmove", function(e){ e.preventDefault(); if(!iedDrag)return; var p=iedPos(e); iedCrop={x:Math.min(iedDrag.x,p.x),y:Math.min(iedDrag.y,p.y),w:Math.abs(p.x-iedDrag.x),h:Math.abs(p.y-iedDrag.y)}; drawIed(); }, {passive:false});
  iedCanvas.addEventListener("touchend", function(){ iedDrag=null; });

  document.getElementById("btn-delete").addEventListener("click", function(){
    if(!currentId||!confirm("למחוק את הפריט?")) return;
    items=items.filter(function(i){return i.id!==currentId;});
    save("items",items); currentId=null; renderList(); show("screen-list");
  });
});
